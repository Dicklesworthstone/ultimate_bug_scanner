name: UBS Manifest

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv with caching
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 jq ripgrep >/dev/null
      - name: Install ast-grep (npm)
        run: npm install -g @ast-grep/cli >/dev/null
      - name: Install toon_rust encoder (tru)
        # The toon-format-* manifest cases validate real TOON encoding, which
        # needs the toon_rust reference encoder on PATH (default probe: `tru`).
        # Pinned release + sha256 sidecar verification.
        run: |
          TOON_RUST_TAG="v0.2.3"
          curl -fsSLO "https://github.com/Dicklesworthstone/toon_rust/releases/download/${TOON_RUST_TAG}/toon-linux-amd64.tar.xz"
          curl -fsSLO "https://github.com/Dicklesworthstone/toon_rust/releases/download/${TOON_RUST_TAG}/toon-linux-amd64.tar.xz.sha256"
          sha256sum -c <(awk '{print $1"  toon-linux-amd64.tar.xz"}' toon-linux-amd64.tar.xz.sha256)
          tar -xf toon-linux-amd64.tar.xz
          sudo install -m 0755 toon /usr/local/bin/tru
          rm -f toon toon-linux-amd64.tar.xz toon-linux-amd64.tar.xz.sha256
          tru --version
      - name: Run UBS manifest suite
        env:
          NO_COLOR: "1"
          UBS_NO_AUTO_UPDATE: "1"
          UBS_LOG_JSON: "1"
        run: |
          cd test-suite
          uv run python run_manifest.py --fail-fast
